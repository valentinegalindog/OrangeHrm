name: Selenium Automation Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:
    inputs:
      execution_env:
        description: 'Entorno de ejecución'
        required: true
        default: 'browserstack'
        type: choice
        options:
          - browserstack
          - local

jobs:
  selenium-tests:
    runs-on: ubuntu-latest

    env:
      # Las credenciales las lee BaseTest directamente desde env vars
      BROWSERSTACK_USERNAME: ${{ secrets.BROWSERSTACK_USERNAME }}
      BROWSERSTACK_ACCESS_KEY: ${{ secrets.BROWSERSTACK_ACCESS_KEY }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup JDK 11
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 11

      - name: Cache Maven dependencies
        uses: actions/cache@v4
        with:
          path: ~/.m2
          key: ${{ runner.os }}-maven-${{ hashFiles('**/pom.xml') }}
          restore-keys: |
            ${{ runner.os }}-maven-

      # ── Solo para ejecución local ─────────────────────────────────────────
      - name: Install Chrome (solo ejecución local)
        if: github.event_name == 'workflow_dispatch' && github.event.inputs.execution_env == 'local'
        run: |
          sudo apt-get update
          sudo apt-get install -y google-chrome-stable

      # ── BrowserStack: push/PR automático o dispatch con browserstack ──────
      - name: Run tests on BrowserStack
        if: github.event_name != 'workflow_dispatch' || github.event.inputs.execution_env == 'browserstack'
        run: |
          mvn clean test \
            -Dexecution.env=browserstack \
            -DBROWSERSTACK_USERNAME=${{ secrets.BROWSERSTACK_USERNAME }} \
            -DBROWSERSTACK_ACCESS_KEY=${{ secrets.BROWSERSTACK_ACCESS_KEY }} \
            -DGITHUB_RUN_NUMBER=${{ github.run_number }}

      # ── Local headless ────────────────────────────────────────────────────
      - name: Run tests locally (headless)
        if: github.event_name == 'workflow_dispatch' && github.event.inputs.execution_env == 'local'
        run: mvn clean test -Pheadless

      # ── Artefactos siempre ────────────────────────────────────────────────
      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-reports-${{ github.run_number }}
          path: |
            target/surefire-reports/
            test-output/
            screenshots/
            reports/