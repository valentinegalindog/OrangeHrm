name: Selenium Automation Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:
    inputs:
      execution_env:
        description: Entorno de ejecución
        required: true
        default: local
        type: choice
        options:
          - local
          - browserstack

jobs:
  selenium-tests:
    runs-on: ubuntu-latest

    env:
      BROWSERSTACK_USERNAME: ${{ secrets.BROWSERSTACK_USERNAME }}
      BROWSERSTACK_ACCESS_KEY: ${{ secrets.BROWSERSTACK_ACCESS_KEY }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup JDK 11
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 11

      - name: Cache Maven dependencies
        uses: actions/cache@v4
        with:
          path: ~/.m2
          key: ${{ runner.os }}-maven-${{ hashFiles('**/pom.xml') }}

      - name: Install Chrome (local tests)
        if: github.event.inputs.execution_env != 'browserstack'
        run: |
          sudo apt-get update
          sudo apt-get install -y google-chrome-stable

      - name: Run Selenium Tests (BrowserStack)
        if: github.event.inputs.execution_env == 'browserstack'
        run: |
          mvn clean test -Pbrowserstack

      - name: Run Selenium Tests (Local)
        if: github.event.inputs.execution_env != 'browserstack'
        run: |
          mvn clean test -Dheadless=true

      - name: Upload Test Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: |
            target/surefire-reports/
            screenshots/
            test-output/